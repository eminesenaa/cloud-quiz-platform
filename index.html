<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuizPin – Real-Time Quiz</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
</head>

<body>

  <!-- Nav -->
  <nav>
    <div class="logo" onclick="showPage('page-home')">Quiz<span>Pin</span></div>
    <div class="nav-r" id="navr">
      <button class="btn bo bsm" onclick="openAuth()">Sign In</button>
    </div>
  </nav>

  <!-- Toast & Loading -->
  <div id="toast"></div>
  <div id="ld">
    <div class="sp"></div>
  </div>

  <!-- Auth Modal -->
  <div class="mbg" id="amod">
    <div class="modal">
      <button class="mx" onclick="closeAuth()">✕</button>
      <h2>Sign In</h2>
      <p class="msub">Sign in to save your quizzes</p>
      <div class="tabs">
        <button class="tab on" onclick="atab('l')">Login</button>
        <button class="tab" onclick="atab('r')">Register</button>
      </div>
      <div id="tl">
        <div class="field"><label>Email</label><input type="email" id="le" placeholder="you@example.com"></div>
        <div class="field"><label>Password</label><input type="password" id="lp" placeholder="••••••••"></div>
        <button class="btn bp bbl" style="margin-bottom:14px" onclick="doLogin()">Sign In</button>
        <div class="div">or</div>
        <button class="btn bgoog" onclick="doGoogle()">
          <img src="https://www.google.com/favicon.ico" alt="G"> Continue with Google
        </button>
      </div>
      <div id="tr" style="display:none">
        <div class="field"><label>Email</label><input type="email" id="re" placeholder="you@example.com"></div>
        <div class="field"><label>Password</label><input type="password" id="rp" placeholder="At least 6 characters">
        </div>
        <button class="btn bp bbl" style="margin-bottom:14px" onclick="doReg()">Create Account</button>
        <div class="div">or</div>
        <button class="btn bgoog" onclick="doGoogle()">
          <img src="https://www.google.com/favicon.ico" alt="G"> Continue with Google
        </button>
      </div>
    </div>
  </div>

  <!-- Pages injected here -->
  <div id="app-root"></div>

  <!-- JS (order matters) -->
  <script src="js/app.js"></script>
  <script src="js/create.js"></script>
  <script src="js/host.js"></script>
  <script src="js/play.js"></script>

  <script>
    const templates = ['home', 'create', 'host', 'play'];

    Promise.all(
      templates.map(t =>
        fetch(`templates/${t}.html`)
          .then(r => r.text())
          .catch(() => '')
      )
    ).then(htmls => {
      document.getElementById('app-root').innerHTML = htmls.join('\n');
      if (typeof addQ === 'function') addQ();
    });
  </script>

</body>

</html>
