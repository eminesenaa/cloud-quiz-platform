<!-- templates/create.html -->
<div class="page" id="page-create">
    <div class="wrap">
        <div class="ph">
            <h2>🎯 Create Quiz</h2>
            <p>Add your questions → Launch → Share the PIN</p>
        </div>

        <div class="qmeta">
            <div class="field" style="margin:0">
                <label>Quiz Title</label>
                <input type="text" id="qtitle" placeholder="e.g. General Knowledge Night 🎉">
            </div>
        </div>

        <div id="qcont"></div>

        <button class="addq" onclick="addQ()">＋ Add Question</button>

        <div class="abar">
            <button class="btn bo" onclick="showPage('page-home')">← Back</button>
            <button class="btn bo" id="bsave" style="display:none" onclick="saveQuiz()">💾 Save</button>
            <button class="btn bp blg" onclick="startGame()">🚀 Launch &amp; Get PIN</button>
        </div>
    </div>
</div>
